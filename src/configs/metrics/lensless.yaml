device: "auto"
train:
  - _target_: src.metrics.LenslessMetric
    metric:
      _target_: torchmetrics.image.PeakSignalNoiseRatio
      data_range: 1.0
    device: ${metrics.device}
    name: "PSNR"
inference:
  - _target_: src.metrics.LenslessMetric
    metric:
      _target_: torchmetrics.image.PeakSignalNoiseRatio
      data_range: 1.0
    device: ${metrics.device}
    name: "PSNR"
  - _target_: src.metrics.LenslessMetric
    metric:
      _target_: torchmetrics.image.StructuralSimilarityIndexMeasure
      data_range: 1.0
    device: ${metrics.device}
    name: "SSIM"
  - _target_: src.metrics.LenslessMetric
    metric:
      _target_: torchmetrics.image.LearnedPerceptualImagePatchSimilarity
      net_type: "vgg"
      normalize: true
    device: ${metrics.device}
    name: "LPIPS"
  - _target_: src.metrics.LenslessMetric
    metric:
      _target_: torchmetrics.MeanSquaredError
    device: ${metrics.device}
    name: "MSE"
